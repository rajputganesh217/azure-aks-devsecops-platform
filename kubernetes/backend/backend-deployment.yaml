apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoe-backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shoe-backend
  template:
    metadata:
      labels:
        app: shoe-backend
    spec:
      containers:
        - name: backend
          image: "{{IMAGE_TAG}}"
          imagePullPolicy: Always

          ports:
            - containerPort: 5000
          
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "10m"
              memory: "64Mi"

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL

          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
