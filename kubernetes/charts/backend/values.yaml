replicaCount: 1
image:
  repository: mydevopsacr123.azurecr.io/backend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  host: "api-dev.microservices.local"
  tlsSecretName: microservices-tls-secret

resources:
  limits:
    cpu: "50m"
    memory: "64Mi"
  requests:
    cpu: "5m"
    memory: "32Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPU: 70
