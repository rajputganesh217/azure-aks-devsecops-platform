apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shoe-ingress
  annotations:
    # REMOVE THIS LINE: kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/appgw-ssl-certificate: "dev-microservices-cert"
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: azure-application-gateway
  rules:
  - host: dev.microservices.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shoe-frontend
            port:
              number: 80
