apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{IMAGE_TAG}}"
        imagePullPolicy: Always
        
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"

        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL

        livenessProbe:
          exec:
            command:
              - pgrep
              - -f
              - worker.py
          initialDelaySeconds: 10
          periodSeconds: 20
        
        readinessProbe:
          exec:
            command:
              - pgrep
              - -f
              - worker.py
          initialDelaySeconds: 5
          periodSeconds: 10

        env:
          - name: DB_HOST
            value: postgres
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_DB
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: POSTGRES_PASSWORD
