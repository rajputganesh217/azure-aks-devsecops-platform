<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">DevOps Flow</title>
  <desc id="desc">Corrected Azure DevSecOps architecture diagram with typo fixes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#2b2b2b" />
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc" />
      <stop offset="100%" stop-color="#eef4fb" />
    </linearGradient>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1f2937; }
      .title { font-size: 28px; font-weight: 700; }
      .section { font-size: 22px; font-weight: 700; }
      .label { font-size: 14px; }
      .small { font-size: 12px; }
      .tiny { font-size: 11px; }
      .box { fill: #ffffff; stroke: #b7c5d8; stroke-width: 2; }
      .panel { fill: none; stroke: #c8d2df; stroke-width: 2; }
      .blue { fill: #eaf4ff; }
      .soft { fill: #f7fbff; }
      .accent { fill: #dfeeff; }
      .line { stroke: #2b2b2b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .line-thin { stroke: #2b2b2b; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .muted { fill: #526071; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)" />

